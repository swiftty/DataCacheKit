name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  mac-os:
    runs-on: macos-26
    strategy:
      matrix:
        # renovate-xcodereleases: runs-on=macos-26
        xcode: ["26.6"]
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - uses: actions/checkout@v7
      - name: Build
        run: swift build
      - name: Run tests
        run: swift test
